<!DOCTYPE html>
<html>
<head>
    <title>{{ algorithm }} Input</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1 class="title">{{ algorithm }}</h1>

    {% if mode %}
        <p class="subtitle">Game Mode: {{ mode }}</p>
    {% endif %}

    <div class="form-card">
        <h2>Enter Process Information</h2>

        <form method="POST">

            <label>Number of Processes</label>
            <input
                type="number"
                name="n"
                min="1"
                value="{{ old_n if old_n else '' }}"
                required
            >

            <label>Arrival Times</label>
            <input
                type="text"
                name="arrival_times"
                placeholder="0,1,2,3"
                value="{{ old_at if old_at else '' }}"
                required
            >

            <label>Burst Times</label>
            <input
                type="text"
                name="burst_times"
                placeholder="5,3,4,2"
                value="{{ old_bt if old_bt else '' }}"
                required
            >

            {% if algorithm == "Priority" %}
                <label>Priorities</label>
                <input
                    type="text"
                    name="priorities"
                    placeholder="1,3,2,4"
                    value="{{ old_priorities if old_priorities else '' }}"
                    required
                >
            {% endif %}

            {% if algorithm == "RR" %}
                <label>Time Quantum</label>
                <input
                    type="number"
                    name="quantum"
                    min="1"
                    value="{{ old_quantum if old_quantum else '' }}"
                    required
                >
            {% endif %}

            <button class="btn" type="submit">
                Run {{ algorithm }}
            </button>
        </form>
    </div>

    <br>

    <div class="nav-buttons">
        <a href="{{ url_for('algorithms_page') }}">
            <button class="btn">Back</button>
        </a>

        <a href="{{ url_for('home') }}">
            <button class="btn">Home</button>
        </a>
    </div>

</div>

</body>
</html>
