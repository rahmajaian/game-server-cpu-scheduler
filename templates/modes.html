<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Game Mode</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">
        <h1 class="title">CHOOSE YOUR GAME MODE</h1>
        <p class="subtitle">Select a gaming scenario to explore the best CPU scheduling strategy</p>

        <div class="card-grid">
            {% for mode_name, mode_data in modes.items() %}
                <a href="{{ url_for('mode_details', mode_slug=mode_data.slug) }}" class="mode-link">
                    <div class="card mode-card">
                        <h2>{{ mode_name }}</h2>
                        <p>{{ mode_data.description }}</p>
                    </div>
                </a>
            {% endfor %}
        </div>

        <div class="nav-buttons" style="margin-top: 30px;">
            <a href="{{ url_for('home') }}">
                <button class="btn">Home</button>
            </a>
        </div>
    </div>

</body>
</html>
